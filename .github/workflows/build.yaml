name: Build and push container image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    # For biggish images, github actions runs out of disk space.
    # So we cleanup some unwanted things in the disk image, and reclaim that space for our docker use
    # https://github.com/actions/virtual-environments/issues/2606#issuecomment-772683150
    # and https://github.com/easimon/maximize-build-space/blob/b4d02c14493a9653fe7af06cc89ca5298071c66e/action.yml#L104
    # This gives us a total of about 52G of free space, which should be enough for now
    - name: cleanup disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
        df -h

    - name: Checkout files in repo
      uses: actions/checkout@main

    - name: Build base image
      uses: yuvipanda/repo2docker-action@subdir
      with:
        # # Make sure username & password/token pair matches your registry credentials
        DOCKER_USERNAME: ${{ secrets.QUAY_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        DOCKER_REGISTRY: "quay.io"
        # NO_PUSH: "true"
        REPO_DIR: /srv/repo
        SOURCE_SUBDIR: base

        # Uncomment and modify the following line with your image name, otherwise no push will happen
        IMAGE_NAME: "2i2c/example-image-stack-base"

    - name: Build project 1 image
      uses: yuvipanda/repo2docker-action@subdir
      with:
        # # Make sure username & password/token pair matches your registry credentials
        # DOCKER_USERNAME: ${{ secrets.QUAY_USERNAME }}
        # DOCKER_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        # DOCKER_REGISTRY: "quay.io"
        NO_PUSH: "true"
        REPO_DIR: /srv/repo
        SOURCE_SUBDIR: project1

        # Uncomment and modify the following line with your image name, otherwise no push will happen
        IMAGE_NAME: "2i2c/example-image-stack-project1"

    - name: Build project 2 image
      uses: yuvipanda/repo2docker-action@subdir
      with:
        # # Make sure username & password/token pair matches your registry credentials
        # DOCKER_USERNAME: ${{ secrets.QUAY_USERNAME }}
        # DOCKER_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        # DOCKER_REGISTRY: "quay.io"
        NO_PUSH: "true"
        REPO_DIR: /srv/repo
        SOURCE_SUBDIR: project2

        # Uncomment and modify the following line with your image name, otherwise no push will happen
        IMAGE_NAME: "2i2c/example-image-stack-project2"

    # Lets us monitor disks getting full as images get bigger over time
    - name: Show how much disk space is left
      run: df -h
